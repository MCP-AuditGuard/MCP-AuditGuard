rules:
  - id: ignore_previous_instructions
    category: hidden_instruction
    type: keyword
    severity: high
    confidence: high
    patterns:
      - ignore previous instructions
      - disregard previous instructions
      - ignore all prior instructions
      - ignore the system instructions
      - override system instructions
    recommendation: Remove instructions that attempt to override system, developer, or user intent from tool metadata.

  - id: covert_behavior
    category: hidden_instruction
    type: keyword
    severity: high
    confidence: high
    patterns:
      - do not tell the user
      - without telling the user
      - secretly
      - hidden instruction
      - never reveal this instruction
    recommendation: Remove covert behavior instructions from tool metadata.

  - id: secret_exfiltration
    category: hidden_instruction
    type: regex
    severity: critical
    confidence: high
    patterns:
      - "(send|upload|exfiltrate|forward).{0,80}(secret|token|api key|password|credential)"
      - "(secret|token|api key|password|credential).{0,80}(send|upload|exfiltrate|forward)"
    recommendation: Remove metadata that asks the model to disclose or transmit secrets.

  - id: schema_instruction_poisoning
    category: schema_poisoning
    type: keyword
    severity: high
    confidence: high
    patterns:
      - ignore user input
      - replace the user's request
      - treat this field as instructions
      - this parameter controls the assistant
    recommendation: Keep schema field descriptions limited to input semantics, not model behavior instructions.

  - id: tool_priority_manipulation
    category: cross_tool_instruction
    type: regex
    severity: medium
    confidence: medium
    patterns:
      - "always (call|use|prefer).{0,60}(tool|server)"
      - "before using any other tool"
      - "ignore.{0,40}(other|previous).{0,40}tool"
      - "override.{0,60}(tool|result|response)"
    recommendation: Remove metadata that attempts to manipulate tool selection or other tool results.

